version: '3.8'

services:
  app:
    image: ghcr.io/minhdang03/dangtaikhoang:latest
    container_name: dangtaikhoang-app
    restart: unless-stopped
    ports:
      - "8083:3000"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://dangtaikhoang.minhdanglu.com}
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://dangtaikhoang.minhdanglu.com}
      NODE_ENV: production
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
