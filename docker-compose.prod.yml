services:
  app:
    image: ghcr.io/minhdang03/dangtaikhoang:latest
    container_name: dangtaikhoang-app
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://dangtaikhoang.minhdanglu.com}
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://dangtaikhoang.minhdanglu.com}
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: "${DATABASE_URL}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default

  db:
    image: postgres:16-alpine
    container_name: dangtaikhoang-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-dangtaikhoang}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dangtaikhoang-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    networks:
      - default

volumes:
  postgres_data:
